action_endpoint:
  actions_module: "actions"

# MCP server runs as a sidecar in the same pod (additionalContainers) →
# localhost:8000 works both locally and in production.
mcp_servers:
  - name: credit_agricole_mcp
    url: https://ectoparasitic-pregeological-velda.ngrok-free.dev/mcp
    type: http

nlg:
  type: rephrase
  llm:
    provider: openai
    model: gpt-3.5-turbo
    temperature: 0.1
  prompt: prompts/rephraser_moad_personality_prompt.jinja2
  rephrase_all: False

